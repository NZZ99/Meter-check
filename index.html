<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartMeter Pro</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #060B18; 
            color: #F8FAFC; 
            user-select: none; 
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 24px; 
        }

        @keyframes dropIn {
            from { transform: translateY(-120%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .banner-animation {
            animation: dropIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .loading-ring { animation: ring-rotate 1s linear infinite; }
        @keyframes ring-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .list-animation { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .history-scroll {
            height: calc(100vh - 460px); 
            overflow-y: auto;
            padding-bottom: 30px;
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="antialiased">

    <!-- Top Banner -->
    <div id="installBanner" class="fixed top-4 left-4 right-4 z-[100] liquid-glass p-4 flex items-center justify-between banner-animation">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="zap" class="text-white w-5 h-5 fill-white/20"></i>
            </div>
            <div>
                <p class="text-white text-[11px] font-extrabold tracking-wide">App အဖြစ် အသုံးပြုရန်</p>
                <p class="text-slate-400 text-[9px]">Browser Menu မှ <span class="text-blue-400 font-bold text-[10px]">Add to Home Screen</span> ကိုနှိပ်ပါ</p>
            </div>
        </div>
        <button onclick="document.getElementById('installBanner').style.display='none'" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10">
            <i data-lucide="x" class="text-slate-500 w-4 h-4"></i>
        </button>
    </div>

    <!-- Main Container -->
    <div id="app-root" class="max-w-md mx-auto h-screen flex flex-col pt-24">
        
        <!-- Fixed Search Section -->
        <div class="px-6 flex-none">
            <header class="pb-6 relative">
                <div class="relative z-10 flex items-center gap-4 mb-6">
                    <div class="w-12 h-12 glass-card flex items-center justify-center border-blue-500/20 shadow-xl">
                        <i data-lucide="zap" class="text-blue-400 fill-blue-400/20 w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-black tracking-tight text-white uppercase">SmartMeter</h1>
                        <p class="text-blue-500/60 text-[9px] font-bold uppercase tracking-[0.4em]">Fast Analytics</p>
                    </div>
                </div>

                <form id="searchForm" class="relative group z-10">
                    <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-500">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </div>
                    <input type="text" id="searchInput" 
                        class="w-full h-14 bg-white/5 border border-white/10 rounded-[20px] pl-14 pr-5 text-white outline-none focus:border-blue-500/50 focus:bg-white/10 transition-all text-sm" 
                        placeholder="ကုဒ် သို့မဟုတ် မီတာနံပါတ်...">
                    <button type="submit" class="absolute right-2 top-2 bottom-2 px-5 bg-blue-600 text-white rounded-[16px] font-extrabold text-xs active:scale-95 transition-all shadow-lg">
                        ရှာမည်
                    </button>
                </form>
            </header>
        </div>

        <!-- Result Content -->
        <main class="px-6 flex-1 flex flex-col min-h-0">
            
            <div id="loading" class="hidden glass-card p-10 flex flex-col items-center justify-center">
                <div class="w-10 h-10 mb-4 border-4 border-t-blue-500 rounded-full loading-ring border-white/5"></div>
                <p class="font-bold text-slate-500 text-[9px] tracking-widest uppercase italic">ရှာဖွေနေပါသည်...</p>
            </div>

            <div id="empty" class="glass-card py-20 text-center border-dashed">
                <i data-lucide="search" class="w-6 h-6 text-slate-700 mx-auto mb-4 opacity-30"></i>
                <p class="text-slate-500 font-bold text-[10px] px-10">မီတာအချက်အလက်များကို ကြည့်ရှုရန် ရှာဖွေပါ</p>
            </div>

            <div id="result" class="hidden flex flex-col h-full space-y-4">
                
                <!-- Fixed Profile Card -->
                <div class="glass-card p-6 border-blue-500/10 shadow-2xl flex-none sticky top-0 z-30">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex-1">
                            <p class="text-blue-500 text-[8px] font-black uppercase tracking-widest mb-1">ပိုင်ရှင်အမည်</p>
                            <h2 id="resName" class="text-xl font-black text-white truncate leading-tight">---</h2>
                            <div class="flex items-center gap-2 text-slate-500 mt-2">
                                <i data-lucide="map-pin" class="w-3 h-3"></i>
                                <span id="resAddr" class="text-[9px] font-medium">---</span>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-white/[0.02] p-4 rounded-2xl border border-white/5">
                            <p class="text-[7px] font-bold text-slate-500 uppercase mb-1" id="label1">---</p>
                            <p id="val1" class="font-black text-white text-sm">---</p>
                        </div>
                        <div class="bg-white/[0.02] p-4 rounded-2xl border border-white/5">
                            <p class="text-[7px] font-bold text-slate-500 uppercase mb-1" id="label2">---</p>
                            <p id="val2" class="font-black text-white text-sm">---</p>
                        </div>
                    </div>
                </div>

                <!-- Scrollable History List -->
                <div id="historyList" class="history-scroll space-y-3"></div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYaeZwJ9WmJ7icvN1SjeKI_lxQ07RgNrsnRl5Q43MhkYN24r3I5QPGNvVDCBHRrrqgCg/exec";
        
        // Fast Cache Memory
        const dataCache = new Map();
        
        lucide.createIcons();

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if(!query) return;

            // Check Cache first
            if(dataCache.has(query)) {
                renderResult(dataCache.get(query), query);
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('empty').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');

            try {
                // Fetch with timeout/optimized handling
                const response = await fetch(`${SCRIPT_URL}?search=${encodeURIComponent(query)}`);
                const data = await response.json();

                if(data && data.owner) {
                    dataCache.set(query, data); // Save to cache
                    renderResult(data, query);
                } else {
                    alert("ရှာမတွေ့ပါ၊ ကုဒ်ပြန်စစ်ပေးပါ။");
                    document.getElementById('empty').classList.remove('hidden');
                    document.getElementById('loading').classList.add('hidden');
                }
            } catch (err) {
                alert("ဒေတာချိတ်ဆက်မှု အဆင်မပြေပါ");
                document.getElementById('empty').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
            }
        });

        function renderResult(data, query) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('resName').innerText = data.owner;
            document.getElementById('resAddr').innerText = data.address || "ရန်ကုန်တိုင်းဒေသကြီး";

            const val1 = document.getElementById('val1'), val2 = document.getElementById('val2');
            const label1 = document.getElementById('label1'), label2 = document.getElementById('label2');

            if(query === data.comCode.toString()) {
                label1.innerText = "Ledger Code"; val1.innerText = data.ledgerCode;
                label2.innerText = "Meter No"; val2.innerText = data.meterNo;
            } else if(query === data.ledgerCode.toString()) {
                label1.innerText = "Com Code"; val1.innerText = data.comCode;
                label2.innerText = "Meter No"; val2.innerText = data.meterNo;
            } else {
                label1.innerText = "Com Code"; val1.innerText = data.comCode;
                label2.innerText = "Ledger Code"; val2.innerText = data.ledgerCode;
            }

            let html = '';
            data.history.forEach((row, idx) => {
                html += `
                <div class="glass-card p-4 flex items-center justify-between list-animation" style="animation-delay: ${idx * 0.04}s">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-blue-400 border border-white/5">
                            <i data-lucide="calendar" class="w-4 h-4"></i>
                        </div>
                        <div>
                            <p class="font-black text-white text-[12px] mb-0.5">${row.month}</p>
                            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">${row.unit} သုံးစွဲယူနစ်</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-blue-400 text-sm">${row.amount.toLocaleString()}</p>
                        <p class="text-[8px] font-black text-slate-600 tracking-widest mt-0.5 uppercase italic">MMK</p>
                    </div>
                </div>`;
            });

            document.getElementById('historyList').innerHTML = html;
            lucide.createIcons();
            document.getElementById('result').classList.remove('hidden');
            
            // Auto scroll to top of list
            document.getElementById('historyList').scrollTop = 0;
        }
    </script>
</body>
</html>
